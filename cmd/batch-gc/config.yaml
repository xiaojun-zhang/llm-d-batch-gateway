# Batch garbage collector configuration

# If true, only log what would be deleted without actually deleting
dry_run: false

# Collector-specific settings
collector:
  # Interval between garbage collection cycles
  interval: 1h
  # Maximum number of concurrent item deletions per GC cycle (default: 10)
  max_concurrency: 10

# Database client configuration
db_client:
  # Type selects the database backend: "redis" or "postgresql".
  # Connection URLs are read from the app secret (/etc/.secrets/), not from this file.
  type: "postgresql"

  # Redis client settings (connection URL is read from the app secret, not here).
  # 0 (or "0s") means go-redis library default.
  # redis:
  #   db: 0
  #   enable_tls: false
  #   insecure: false
  #   timeout: "0s"
  #   max_retries: 0
  #   min_retry_backoff: "0s"
  #   max_retry_backoff: "0s"
  #   pool_timeout: "0s"
  #   conn_max_idle_time: "0s"
  #   conn_max_lifetime: "0s"

# File storage backend configuration.
file_client:
  type: "fs"
  fs:
    base_path: "/tmp/batch-gateway"

  # S3-compatible storage (uncomment to use instead of fs)
  # s3:
  #   region: "us-east-1"
  #   endpoint: ""
  #   access_key_id: ""
  #   prefix: ""
  #   use_path_style: false
