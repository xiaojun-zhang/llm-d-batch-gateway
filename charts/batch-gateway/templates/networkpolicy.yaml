{{- if .Values.networkPolicy.enabled -}}
{{- if .Values.apiserver.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "batch-gateway.apiserver.fullname" . }}
  labels:
    {{- include "batch-gateway.apiserver.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "batch-gateway.apiserver.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.networkPolicy.apiserver.ingressFrom }}
    - ports:
        - port: {{ .Values.apiserver.config.port }}
          protocol: TCP
      from:
        {{- toYaml .Values.networkPolicy.apiserver.ingressFrom | nindent 8 }}
    {{- end }}
    {{- if .Values.networkPolicy.monitoring.ingressFrom }}
    - ports:
        - port: {{ .Values.apiserver.config.observabilityPort }}
          protocol: TCP
      from:
        {{- toYaml .Values.networkPolicy.monitoring.ingressFrom | nindent 8 }}
    {{- end }}
{{- end }}
{{- if .Values.processor.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "batch-gateway.processor.fullname" . }}
  labels:
    {{- include "batch-gateway.processor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "batch-gateway.processor.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.networkPolicy.monitoring.ingressFrom }}
    - ports:
        - port: {{ trimPrefix ":" .Values.processor.config.addr }}
          protocol: TCP
      from:
        {{- toYaml .Values.networkPolicy.monitoring.ingressFrom | nindent 8 }}
    {{- end }}
{{- end }}
{{- if .Values.gc.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "batch-gateway.gc.fullname" . }}
  labels:
    {{- include "batch-gateway.gc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "batch-gateway.gc.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.networkPolicy.monitoring.ingressFrom }}
    - ports:
        - port: {{ trimPrefix ":" .Values.gc.config.metricsAddr }}
          protocol: TCP
      from:
        {{- toYaml .Values.networkPolicy.monitoring.ingressFrom | nindent 8 }}
    {{- end }}
{{- end }}
{{- end }}
